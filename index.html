<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0908">
<title>夜語り</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Old+Mincho&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0a0908;
  --bg1:   #141210;
  --bg2:   #1e1a15;
  --bg3:   #28221a;
  --gold:  #c8991e;
  --gold2: #e8be50;
  --goldf: rgba(200,153,30,0.12);
  --tx0:   #ede0c6;
  --tx1:   #9e8660;
  --tx2:   #564838;
  --tx3:   #302618;
  --red:   #8b2020;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --serif: 'Noto Serif JP', 'Hiragino Mincho ProN', 'YuMincho', serif;
  --disp:  'Zen Old Mincho', serif;
  --mono:  'Share Tech Mono', monospace;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }

body {
background: var(–bg);
color: var(–tx0);
font-family: var(–serif);
display: flex;
flex-direction: column;
/* iOS safe area */
padding-top: env(safe-area-inset-top, 0px);
}

/* ── TOP BAR ── */
.topbar {
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 18px 10px;
border-bottom: 1px solid var(–tx3);
background: var(–bg);
position: sticky; top: 0; z-index: 10;
}
.app-name {
font-family: var(–disp);
font-size: 22px;
color: var(–gold);
letter-spacing: 0.12em;
text-shadow: 0 0 24px rgba(200,153,30,0.35);
}
.badge {
font-family: var(–mono);
font-size: 10px;
letter-spacing: 0.14em;
color: var(–tx2);
display: flex; align-items: center; gap: 5px;
transition: color 0.3s;
}
.badge.on { color: var(–gold2); }
.bdot {
width: 6px; height: 6px; border-radius: 50%;
background: var(–tx2); transition: all 0.3s;
}
.badge.on .bdot {
background: var(–gold2);
box-shadow: 0 0 8px var(–gold2);
animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── SCROLL AREA ── */
.scroll-area {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
padding: 16px 18px 12px;
}

/* ── URL INPUT ── */
.url-section { margin-bottom: 14px; }
.url-row { display: flex; gap: 8px; }
.url-in {
flex: 1;
background: var(–bg2);
border: 1px solid var(–tx3);
border-radius: 10px;
color: var(–tx0);
font-family: var(–mono);
font-size: 13px;
padding: 12px 14px;
outline: none;
-webkit-appearance: none;
transition: border-color 0.2s;
min-width: 0;
}
.url-in:focus { border-color: var(–gold); }
.url-in::placeholder { color: var(–tx2); }

.btn {
font-family: var(–serif);
font-size: 14px;
padding: 12px 18px;
border-radius: 10px;
border: 1px solid;
cursor: pointer;
transition: all 0.18s;
white-space: nowrap;
-webkit-appearance: none;
user-select: none;
}
.btn-g { background: var(–gold); border-color: var(–gold); color: var(–bg); font-weight: 700; }
.btn-g:active { background: var(–gold2); }
.btn-g:disabled { opacity: 0.4; pointer-events: none; }
.btn-o { background: none; border-color: var(–tx3); color: var(–tx1); padding: 12px 14px; }
.btn-o:active { border-color: var(–tx1); }

/* ── FETCH STATUS ── */
.fetch-box {
display: none;
align-items: center; gap: 10px;
padding: 11px 14px;
background: var(–bg2);
border: 1px solid var(–tx3);
border-radius: 10px;
margin-bottom: 14px;
font-family: var(–mono);
font-size: 12px;
color: var(–tx1);
}
.fetch-box.show { display: flex; }
.fetch-box.err  { border-color: var(–red); color: #e05050; }
.spin {
width: 16px; height: 16px; flex-shrink: 0;
border: 2px solid var(–tx3); border-top-color: var(–gold);
border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.fetch-box.err .spin { display: none; }

/* ── CHAPTER HEADER ── */
.chap-info { display: none; margin-bottom: 12px; }
.chap-info.show { display: block; }
.chap-title-disp {
font-family: var(–disp);
font-size: 17px;
color: var(–gold2);
letter-spacing: 0.08em;
line-height: 1.5;
margin-bottom: 4px;
}
.chap-link {
font-family: var(–mono);
font-size: 10px;
color: var(–tx2);
word-break: break-all;
text-decoration: none;
}
.chap-link:hover { color: var(–gold); }

/* Progress */
.prog-wrap { display: none; margin-bottom: 10px; }
.prog-wrap.show { display: flex; align-items: center; gap: 10px; }
.prog-track { flex:1; height: 2px; background: var(–tx3); border-radius: 1px; overflow: hidden; }
.prog-fill { height:100%; background: linear-gradient(90deg, #7a5c10, var(–gold)); width:0%; transition: width 0.4s; }
.prog-num { font-family: var(–mono); font-size: 10px; color: var(–tx2); white-space: nowrap; min-width: 56px; text-align: right; }

/* ── TEXT DISPLAY ── */
.novel-text {
background: var(–bg1);
border: 1px solid var(–tx3);
border-radius: 12px;
padding: 22px 20px;
font-size: 16px;
line-height: 2.1;
letter-spacing: 0.04em;
min-height: 120px;
display: none;
}
.novel-text.show { display: block; }

.seg { display: inline; border-radius: 3px; padding: 1px 1px; transition: background 0.15s, color 0.15s; }
.seg.active { background: rgba(200,153,30,0.22); color: var(–gold2); border-bottom: 1.5px solid rgba(200,153,30,0.45); }
.seg.past   { color: var(–tx2); }

/* ── NEXT PAGE NOTICE ── */
.next-notice {
display: none;
align-items: center; gap: 8px;
margin-top: 12px; padding: 10px 14px;
background: rgba(200,153,30,0.07);
border: 1px solid rgba(200,153,30,0.2);
border-radius: 10px;
font-family: var(–mono);
font-size: 11px;
color: var(–tx1);
}
.next-notice.show { display: flex; }
.next-cd { color: var(–gold2); font-size: 15px; font-weight: bold; min-width: 18px; }
.next-cancel { margin-left: auto; color: var(–tx2); cursor: pointer; text-decoration: underline; font-size: 10px; }

/* ── QUEUE CHIPS ── */
.queue-row {
display: none;
flex-wrap: wrap; gap: 6px;
margin-top: 12px;
}
.queue-row.show { display: flex; }
.q-chip {
font-family: var(–mono); font-size: 10px;
padding: 4px 10px; border-radius: 20px;
border: 1px solid var(–tx3); color: var(–tx2); background: var(–bg2);
max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
cursor: pointer; transition: all 0.15s;
}
.q-chip:active { border-color: var(–tx1); }
.q-chip.cur { border-color: var(–gold); color: var(–gold); background: var(–goldf); }
.q-chip.done { opacity: 0.4; text-decoration: line-through; }

/* ── iOS BG WARNING ── */
.bg-tip {
display: none;
margin-top: 10px; padding: 10px 14px;
background: rgba(139,32,32,0.15);
border: 1px solid rgba(139,32,32,0.3);
border-radius: 10px;
font-family: var(–mono); font-size: 11px;
color: #d07070; line-height: 1.7;
}
.bg-tip.show { display: block; }

/* ── BOTTOM CONTROLS (fixed) ── */
.ctrl-bar {
flex-shrink: 0;
background: var(–bg1);
border-top: 1px solid var(–tx3);
padding: 14px 18px;
padding-bottom: calc(14px + var(–safe-b));
}

.slider-grid {
display: grid; grid-template-columns: 1fr 1fr;
gap: 8px 18px; margin-bottom: 14px;
}
.sl {
display: flex; align-items: center; gap: 8px;
}
.sl-l { font-family: var(–mono); font-size: 10px; color: var(–tx2); width: 44px; flex-shrink: 0; }
.sl-v { font-family: var(–mono); font-size: 10px; color: var(–gold); width: 34px; text-align: right; flex-shrink: 0; }
input[type=range] {
flex: 1; -webkit-appearance: none;
height: 3px; background: var(–tx3); border-radius: 2px;
outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 20px; height: 20px; border-radius: 50%;
background: var(–gold); box-shadow: 0 0 6px rgba(200,153,30,0.4);
}

.voice-sl { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.voice-sl .sl-l { width: 44px; }
select {
flex: 1; background: var(–bg2); border: 1px solid var(–tx3);
color: var(–tx0); font-family: var(–serif); font-size: 12px;
padding: 8px 10px; border-radius: 8px; outline: none;
-webkit-appearance: none;
}

.btn-row {
display: flex; align-items: center; justify-content: center; gap: 12px;
}
.cb {
width: 48px; height: 48px; border-radius: 50%;
background: none; border: 1px solid var(–tx3); color: var(–tx1);
font-size: 17px; display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: all 0.15s; user-select: none;
-webkit-appearance: none;
}
.cb:active:not(:disabled) { border-color: var(–gold); color: var(–gold); background: var(–goldf); }
.cb:disabled { opacity: 0.2; pointer-events: none; }
.cb-play {
width: 60px; height: 60px; font-size: 22px;
border-color: var(–gold); color: var(–gold);
}
.cb-play.on { background: var(–goldf); box-shadow: 0 0 20px rgba(200,153,30,0.2); }
.cb-nxt {
width: auto; padding: 0 14px; border-radius: 10px;
font-family: var(–mono); font-size: 11px; letter-spacing: 0.05em;
}
.cb-nxt:not(:disabled) { border-color: var(–gold); color: var(–gold); }

/* ── TOAST ── */
.toast {
position: fixed; bottom: calc(120px + var(–safe-b)); left: 50%; transform: translateX(-50%) translateY(10px);
background: var(–bg3); border: 1px solid var(–tx2);
font-family: var(–mono); font-size: 12px; color: var(–tx0);
padding: 10px 18px; border-radius: 20px;
white-space: nowrap;
opacity: 0; transition: all 0.25s; z-index: 100;
pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<!-- TOP BAR -->

<div class="topbar">
  <div class="app-name">夜語り</div>
  <div class="badge" id="badge"><div class="bdot"></div><span id="btext">待機中</span></div>
</div>

<!-- SCROLL CONTENT -->

<div class="scroll-area" id="scrollArea">

  <!-- URL -->

  <div class="url-section">
    <div class="url-row">
      <input class="url-in" id="urlIn" type="url" inputmode="url" autocomplete="url"
        placeholder="https://ncode.syosetu.com/…"
        onkeydown="if(event.key==='Enter'){this.blur();go()}">
      <button class="btn btn-g" id="btnGo" onclick="go()">読込</button>
      <button class="btn btn-o" onclick="reset()">✕</button>
    </div>
  </div>

  <!-- FETCH STATUS -->

  <div class="fetch-box" id="fetchBox">
    <div class="spin" id="spin"></div>
    <span id="fetchMsg">取得中…</span>
  </div>

  <!-- CHAPTER INFO -->

  <div class="chap-info" id="chapInfo">
    <div class="chap-title-disp" id="chapTitle">—</div>
    <a class="chap-link" id="chapLink" href="#" target="_blank"></a>
  </div>

  <!-- PROGRESS -->

  <div class="prog-wrap" id="progWrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-num" id="progNum">0 / 0</div>
  </div>

  <!-- TEXT -->

  <div class="novel-text" id="novelText">
    <span style="color:var(--tx2);font-family:var(--mono);font-size:12px;">URLを入力して「読込」を押してください</span>
  </div>

  <!-- AUTO-NEXT COUNTDOWN -->

  <div class="next-notice" id="nextNotice">
    <span>次のページへ…</span>
    <span class="next-cd" id="nextCd">5</span>
    <span class="next-cancel" onclick="cancelNext()">キャンセル</span>
  </div>

  <!-- QUEUE -->

  <div class="queue-row" id="queueRow"></div>

  <!-- iOS BACKGROUND TIP -->

  <div class="bg-tip" id="bgTip">
    ⚠ iOSでバックグラウンド再生するには：<br>
    画面ロック後も続けるには <b>画面ロックしない</b> か、<br>
    <b>コントロールセンター → 読み上げコンテンツ</b> の利用もお勧めです。<br>
    再生が止まった場合は画面をタップして再開できます。
  </div>

</div>

<!-- BOTTOM CONTROLS -->

<div class="ctrl-bar">
  <div class="slider-grid">
    <div class="sl">
      <span class="sl-l">速度</span>
      <input type="range" id="slRate" min="0.5" max="2.5" step="0.1" value="1.1" oninput="onRate(this.value)">
      <span class="sl-v" id="vRate">1.1×</span>
    </div>
    <div class="sl">
      <span class="sl-l">音量</span>
      <input type="range" id="slVol" min="0" max="1" step="0.05" value="1" oninput="onVol(this.value)">
      <span class="sl-v" id="vVol">100%</span>
    </div>
    <div class="sl">
      <span class="sl-l">ピッチ</span>
      <input type="range" id="slPitch" min="0.5" max="2.0" step="0.1" value="1.0" oninput="onPitch(this.value)">
      <span class="sl-v" id="vPitch">1.0</span>
    </div>
  </div>
  <div class="voice-sl">
    <span class="sl-l">音声</span>
    <select id="voiceSel" onchange="onVoice()"><option>読み込み中…</option></select>
  </div>
  <div class="btn-row">
    <button class="cb" id="bPrev" onclick="prevSeg()" disabled>⏮</button>
    <button class="cb cb-play" id="bPlay" onclick="togglePlay()" disabled>▶</button>
    <button class="cb" id="bFwd"  onclick="nextSeg()" disabled>⏭</button>
    <button class="cb" id="bStop" onclick="stop()" disabled>■</button>
    <button class="cb cb-nxt" id="bNext" onclick="goNext()" disabled>次→</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  BACKGROUND AUDIO SESSION (iOS trick)
//  サイレント音を流してオーディオセッションを維持
// ═══════════════════════════════════════
let _audioCtx = null;
let _silentLoop = null;

function startSilentAudio() {
  try {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 0.5秒のサイレントバッファを作成してループ再生
    const buf = _audioCtx.createBuffer(1, _audioCtx.sampleRate * 0.5, _audioCtx.sampleRate);
    function loop() {
      if (!_silentLoop) return;
      const src = _audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(_audioCtx.destination);
      src.start();
      src.onended = loop;
    }
    _silentLoop = true;
    loop();
  } catch(e) {}
}
function stopSilentAudio() {
  _silentLoop = false;
  if (_audioCtx) { _audioCtx.close().catch(()=>{}); _audioCtx = null; }
}

// ═══════════════════════════════════════
//  SPEECH SYNTHESIS
// ═══════════════════════════════════════
const SS = window.speechSynthesis;
let voices = [], selVoice = null;

function loadVoices() {
  voices = SS.getVoices();
  const sel = document.getElementById('voiceSel');
  const ja = voices.filter(v => v.lang.startsWith('ja'));
  const all = [...ja, ...voices.filter(v => !v.lang.startsWith('ja'))];
  sel.innerHTML = '';
  if (!all.length) { sel.innerHTML = '<option>音声なし</option>'; return; }
  all.forEach(v => {
    const o = document.createElement('option');
    o.value = voices.indexOf(v);
    o.textContent = v.name + ' (' + v.lang + ')';
    if (v.lang.startsWith('ja') && !selVoice) { o.selected = true; selVoice = v; }
    sel.appendChild(o);
  });
  if (!selVoice && voices.length) selVoice = voices[0];
}
SS.addEventListener ? SS.addEventListener('voiceschanged', loadVoices) : (SS.onvoiceschanged = loadVoices);
loadVoices();

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let segs = [], idx = 0, playing = false;
let nextUrl = null, nextTimer = null, nextCount = 0;
let queue = [], qi = 0;
let watchdog = null; // iOS watchdog timer

// ═══════════════════════════════════════
//  CORS PROXY / FETCH
// ═══════════════════════════════════════
const PROXIES = [
  u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
];

async function fetchHtml(url) {
  let lastErr;
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy(url), { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json().catch(() => null);
      if (j && j.contents) return j.contents;         // allorigins
      const t = await r.text().catch(() => null);
      if (t && t.length > 100) return t;
      throw new Error('empty response');
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error('取得失敗');
}

// ═══════════════════════════════════════
//  SITE-SPECIFIC SELECTORS
// ═══════════════════════════════════════
const SITE_RULES = [
  { host: 'ncode.syosetu.com',    body: '#novel_honbun',           next: '.novel_bn a:last-child, a[href*="next"]' },
  { host: 'novel18.syosetu.com',  body: '#novel_honbun',           next: '.novel_bn a:last-child' },
  { host: 'kakuyomu.jp',          body: '.widget-episodeBody',     next: 'a[href*="next"], .widget-episodeNext a' },
  { host: 'alphapolis.co.jp',     body: '.novel_text, .content-text', next: 'a[href*="next"]' },
  { host: 'hameln.jp',            body: '#honbun',                 next: '#nextpage a, a:contains("次")' },
  { host: 'pixiv.net',            body: '.novel-text-block',       next: 'a[href*="next"]' },
  { host: 'estar.jp',             body: '#novel-content',          next: '.pager-next a' },
];

// 「次へ」系テキストパターン
const NEXT_TEXTS = ['次の話','次話','次章','次のページ','次へ','次話へ','>>','→','next','次回'];

function extractPage(html, pageUrl) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // ノイズ除去
  ['script','style','iframe','nav','header','footer',
   '.ad','.advertisement','.banner','.sns','.share',
   '#global-header','#global-footer'].forEach(s => {
    try { doc.querySelectorAll(s).forEach(el => el.remove()); } catch(e) {}
  });

  const phost = new URL(pageUrl).hostname.replace('www.','');
  const rule = SITE_RULES.find(r => phost.includes(r.host.replace('www.','')));

  // 本文要素
  let bodyEl = null;
  if (rule) bodyEl = doc.querySelector(rule.body);
  if (!bodyEl) {
    for (const sel of ['article .content','#novel_honbun','#novel-body',
      '.episode-content','.widget-episodeBody','.novel_text',
      'article','main','#main','#content','.content']) {
      bodyEl = doc.querySelector(sel);
      if (bodyEl && bodyEl.textContent.trim().length > 100) break;
      else bodyEl = null;
    }
  }
  // 最終手段: 最も長いdiv
  if (!bodyEl) {
    let max = 0;
    doc.querySelectorAll('div, section, article').forEach(el => {
      const l = el.textContent.trim().length;
      if (l > max && l < 50000) { max = l; bodyEl = el; }
    });
  }

  const rawText = (bodyEl ? bodyEl.innerText || bodyEl.textContent : doc.body.textContent || '').trim();

  // タイトル
  const title = (
    doc.querySelector('.novel-title,.episode-title,.chapter-title,h1,.novel_title')?.textContent?.trim() ||
    doc.querySelector('title')?.textContent?.trim() || pageUrl
  ).replace(/\s*[-|｜–—]\s*.+$/, '').trim();

  // 次ページURL
  let nextPageUrl = null;
  // ルール指定のセレクタ
  if (rule && rule.next) {
    const a = doc.querySelector(rule.next);
    if (a) nextPageUrl = resolveUrl(a.getAttribute('href'), pageUrl);
  }
  // テキストベース検索
  if (!nextPageUrl) {
    for (const a of doc.querySelectorAll('a')) {
      const t = (a.textContent || '').trim();
      if (NEXT_TEXTS.some(p => t.includes(p))) {
        const href = a.getAttribute('href');
        if (href && !href.startsWith('javascript') && !href.startsWith('#')) {
          const resolved = resolveUrl(href, pageUrl);
          if (resolved && resolved !== pageUrl) { nextPageUrl = resolved; break; }
        }
      }
    }
  }
  // rel=next
  if (!nextPageUrl) {
    const rn = doc.querySelector('link[rel="next"], a[rel="next"]');
    if (rn) nextPageUrl = resolveUrl(rn.getAttribute('href'), pageUrl);
  }

  if (!rawText || rawText.length < 30)
    throw new Error('本文が取得できませんでした（サイトのアクセス制限の可能性あり）');

  return { title, text: rawText, nextUrl: nextPageUrl };
}

function resolveUrl(href, base) {
  if (!href) return null;
  try { return new URL(href, base).href; } catch(e) { return null; }
}

// ═══════════════════════════════════════
//  MAIN: GO
// ═══════════════════════════════════════
async function go() {
  const url = document.getElementById('urlIn').value.trim();
  if (!url || !url.startsWith('http')) { toast('正しいURLを入力してください'); return; }

  disable(true);
  cancelNext();
  stop();
  showFetch('load', 'ページを取得中…');

  try {
    const html = await fetchHtml(url);
    const page = extractPage(html, url);

    if (!queue.find(q => q.url === url)) { queue.push({url, title: page.title, done: false}); qi = queue.length - 1; }
    else qi = queue.findIndex(q => q.url === url);

    displayPage(page, url);
    startSilentAudio();   // ユーザー操作後なのでAudioContext解禁
    startPlay();
    hideFetch();
    document.getElementById('bgTip').classList.add('show');
  } catch(e) {
    showFetch('err', e.message || '取得に失敗しました');
  }
  disable(false);
}

// ═══════════════════════════════════════
//  DISPLAY PAGE
// ═══════════════════════════════════════
function displayPage(page, url) {
  nextUrl = page.nextUrl || null;

  document.getElementById('chapTitle').textContent = page.title || url;
  const lnk = document.getElementById('chapLink'); lnk.textContent = url; lnk.href = url;
  document.getElementById('chapInfo').classList.add('show');

  segs = splitText(page.text);
  idx = 0;
  renderText();
  updProg();
  ctrlEnable(true);
  document.getElementById('bNext').disabled = !nextUrl;
  renderQueue();
}

// ═══════════════════════════════════════
//  TEXT SPLIT (段落単位 — iOSでは長い方が安定)
// ═══════════════════════════════════════
function splitText(t) {
  return t.replace(/\r\n/g, '\n')
    .split(/\n{1,}/)
    .map(s => s.trim()).filter(s => s.length > 0);
}

function renderText() {
  const box = document.getElementById('novelText');
  box.innerHTML = segs.map((s,i) => '<span class="seg" id="s'+i+'">'+esc(s)+'</span><br>').join('');
  box.classList.add('show');
  document.getElementById('progWrap').classList.add('show');
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════
function speakIdx(i) {
  clearWatchdog();
  if (i >= segs.length) {
    playing = false; updBtn(); setBadge(false);
    if (queue[qi]) queue[qi].done = true;
    renderQueue();
    if (nextUrl) startNextCd();
    else toast('読み上げ完了');
    return;
  }
  idx = i;
  updHighlight();
  updProg();

  const utt = new SpeechSynthesisUtterance(segs[i]);
  if (selVoice) utt.voice = selVoice;
  utt.rate   = +document.getElementById('slRate').value;
  utt.volume = +document.getElementById('slVol').value;
  utt.pitch  = +document.getElementById('slPitch').value;
  utt.lang   = 'ja-JP';

  utt.onstart = () => startWatchdog(utt.rate);
  utt.onend   = () => { clearWatchdog(); if (playing) speakIdx(idx + 1); };
  utt.onerror = (e) => {
    clearWatchdog();
    if (e.error === 'interrupted') return;
    console.warn('TTS error:', e.error);
    if (playing) setTimeout(() => speakIdx(idx), 500); // retry
  };

  SS.speak(utt);
}

// iOS watchdog: もし発話が止まっていたら再開
function startWatchdog(rate) {
  const expected = (segs[idx]?.length || 20) / (rate * 4) * 1000 + 3000;
  watchdog = setTimeout(() => {
    if (playing && !SS.speaking) { SS.cancel(); speakIdx(idx); }
  }, Math.min(expected, 30000));
}
function clearWatchdog() { if (watchdog) { clearTimeout(watchdog); watchdog = null; } }

function startPlay() {
  playing = true; updBtn(); setBadge(true);
  SS.cancel();
  speakIdx(idx);
}

function togglePlay() {
  if (!segs.length) return;
  if (playing) {
    playing = false;
    SS.pause();
    updBtn(); setBadge(false);
    clearWatchdog();
  } else {
    if (SS.paused) { playing = true; SS.resume(); updBtn(); setBadge(true); startWatchdog(+document.getElementById('slRate').value); }
    else startPlay();
  }
}

function stop() {
  playing = false;
  SS.cancel();
  clearWatchdog();
  updBtn(); setBadge(false);
  cancelNext();
}

function prevSeg() { SS.cancel(); clearWatchdog(); const i = Math.max(0,idx-1); if(playing) speakIdx(i); else {idx=i;updHighlight();updProg();} }
function nextSeg() { SS.cancel(); clearWatchdog(); const i = Math.min(segs.length-1,idx+1); if(playing) speakIdx(i); else {idx=i;updHighlight();updProg();} }

// ═══════════════════════════════════════
//  AUTO-NEXT PAGE
// ═══════════════════════════════════════
function startNextCd() {
  nextCount = 5;
  document.getElementById('nextNotice').classList.add('show');
  document.getElementById('nextCd').textContent = nextCount;
  nextTimer = setInterval(() => {
    nextCount--;
    document.getElementById('nextCd').textContent = nextCount;
    if (nextCount <= 0) { cancelNext(); goNext(); }
  }, 1000);
}
function cancelNext() {
  if (nextTimer) { clearInterval(nextTimer); nextTimer = null; }
  document.getElementById('nextNotice').classList.remove('show');
}
async function goNext() {
  if (!nextUrl) { toast('次のページなし'); return; }
  const url = nextUrl;
  document.getElementById('urlIn').value = url;
  stop();
  disable(true);
  showFetch('load', '次のページを取得中…');

  if (!queue.find(q => q.url === url)) { queue.push({url, title:'読込中…', done:false}); qi = queue.length-1; }
  else qi = queue.findIndex(q => q.url === url);

  try {
    const html = await fetchHtml(url);
    const page = extractPage(html, url);
    if (queue[qi]) queue[qi].title = page.title;
    displayPage(page, url);
    startPlay();
    hideFetch();
  } catch(e) {
    showFetch('err', e.message);
  }
  disable(false);
}

// ═══════════════════════════════════════
//  QUEUE
// ═══════════════════════════════════════
function renderQueue() {
  const row = document.getElementById('queueRow');
  if (!queue.length) { row.classList.remove('show'); return; }
  row.classList.add('show');
  row.innerHTML = queue.map((q,i) => {
    let c = 'q-chip';
    if (i===qi) c+=' cur'; if(q.done) c+=' done';
    const t = q.title.length>14 ? q.title.slice(0,13)+'…' : q.title;
    return '<span class="'+c+'" onclick="jumpQ('+i+')" title="'+esc(q.url)+'">'+esc(t)+'</span>';
  }).join('');
}
async function jumpQ(i) {
  if (i===qi) return;
  qi = i;
  const url = queue[i].url;
  document.getElementById('urlIn').value = url;
  stop(); disable(true); showFetch('load','取得中…');
  try {
    const html = await fetchHtml(url);
    const page = extractPage(html, url);
    queue[i].title = page.title;
    displayPage(page, url);
    startPlay();
    hideFetch();
  } catch(e) { showFetch('err', e.message); }
  disable(false);
}

// ═══════════════════════════════════════
//  VISIBILITY (バックグラウンドから復帰)
// ═══════════════════════════════════════
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // Safariでバックグラウンド中に停止した場合の自動再開
    if (playing && !SS.speaking && !SS.pending) {
      SS.cancel();
      setTimeout(() => speakIdx(idx), 300);
    }
    // AudioContextが中断された場合の再開
    if (_audioCtx && _audioCtx.state === 'suspended') {
      _audioCtx.resume().catch(()=>{});
    }
  }
});

// ページタッチで再開 (iOS対策)
document.addEventListener('touchstart', () => {
  if (playing && !SS.speaking && !SS.pending) {
    SS.cancel();
    setTimeout(() => speakIdx(idx), 200);
  }
  if (_audioCtx && _audioCtx.state === 'suspended') {
    _audioCtx.resume().catch(()=>{});
  }
}, { passive: true });

// ═══════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════
function updHighlight() {
  document.querySelectorAll('.seg').forEach((el,i) => {
    el.classList.remove('active','past');
    if(i===idx) el.classList.add('active');
    else if(i<idx) el.classList.add('past');
  });
  const el = document.getElementById('s'+idx);
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}
function updProg() {
  const total = segs.length, cur = Math.min(idx+1, total);
  document.getElementById('progNum').textContent = cur + ' / ' + total;
  document.getElementById('progFill').style.width = (total ? cur/total*100 : 0) + '%';
}
function updBtn() {
  const b = document.getElementById('bPlay');
  b.textContent = playing ? '⏸' : '▶';
  b.classList.toggle('on', playing);
}
function setBadge(on) {
  document.getElementById('badge').classList.toggle('on', on);
  document.getElementById('btext').textContent = on ? '読み上げ中' : '待機中';
}
function ctrlEnable(on) {
  ['bPlay','bStop','bPrev','bFwd'].forEach(id => { document.getElementById(id).disabled = !on; });
}
function disable(on) { document.getElementById('btnGo').disabled = on; }

function showFetch(type, msg) {
  const b = document.getElementById('fetchBox');
  document.getElementById('fetchMsg').textContent = msg;
  b.classList.remove('err');
  if (type==='err') { b.classList.add('err'); document.getElementById('spin').style.display='none'; }
  else { document.getElementById('spin').style.display=''; }
  b.classList.add('show');
}
function hideFetch() { document.getElementById('fetchBox').classList.remove('show'); }

function reset() {
  stop(); stopSilentAudio();
  document.getElementById('urlIn').value = '';
  hideFetch();
  document.getElementById('chapInfo').classList.remove('show');
  document.getElementById('progWrap').classList.remove('show');
  document.getElementById('novelText').classList.remove('show');
  document.getElementById('bgTip').classList.remove('show');
  queue=[]; qi=0; nextUrl=null;
  renderQueue();
  ctrlEnable(false);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function onRate(v)  { document.getElementById('vRate').textContent  = (+v).toFixed(1)+'×'; }
function onVol(v)   { document.getElementById('vVol').textContent   = Math.round(v*100)+'%'; }
function onPitch(v) { document.getElementById('vPitch').textContent = (+v).toFixed(1); }
function onVoice()  { const i=+document.getElementById('voiceSel').value; if(!isNaN(i)) selVoice=voices[i]; }
</script>
